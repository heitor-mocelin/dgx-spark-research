# DGX-side exporters. Run this ON the DGX Spark itself:
#
#   cd dgx && docker compose up -d
#
# Exposes:  node_exporter :9100 | dcgm-exporter :9400 | cAdvisor :8080
# Requires: Docker + the NVIDIA Container Toolkit (nvidia runtime) for dcgm-exporter.
# Architecture: DGX Spark is arm64 — all three images below are multi-arch (arm64 + amd64).

services:
  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    command:
      - "--path.rootfs=/host"
      - "--collector.systemd"
      - "--collector.processes"
    volumes:
      - "/:/host:ro,rslave"

  dcgm-exporter:
    # GPU telemetry (util, power, temp, clocks, framebuffer, XID…). Needs the NVIDIA runtime.
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.9-3.6.1-ubuntu22.04
    container_name: dcgm-exporter
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    cap_add:
      - SYS_ADMIN
    ports:
      - "9400:9400"

  cadvisor:
    # Per-container CPU/RAM (so you can attribute usage to the vLLM / llama.cpp containers).
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - "/dev/kmsg"
    ports:
      - "8080:8080"
    volumes:
      - "/:/rootfs:ro"
      - "/var/run:/var/run:ro"
      - "/sys:/sys:ro"
      - "/var/lib/docker/:/var/lib/docker:ro"
      - "/dev/disk/:/dev/disk:ro"

# Auto-loads every dashboard JSON in /var/lib/grafana/dashboards (mounted from ./dashboards).
apiVersion: 1

providers:
  - name: dgx-spark
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    allowUiUpdates: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
